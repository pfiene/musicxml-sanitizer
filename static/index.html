<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MusicXML Sanitizer - Interactive Healing</title>
    <script src="https://www.verovio.org/javascript/latest/verovio-toolkit-wasm.js" defer></script>
    <style>
        :root { --dark: #2c3e50; --accent: #27ae60; --sidebar: #ffffff; --viewer: #cbd3da; --warning: #f39c12; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #f4f4f4; overflow: hidden; }
        
        header { background: var(--dark); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 100; }
        .nav-controls { display: flex; align-items: center; gap: 15px; }
        .btn-nav { background: #34495e; color: white; border: 1px solid #555; padding: 5px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        
        #main { display: flex; flex: 1; overflow: hidden; }
        
        #sidebar { width: 380px; display: flex; flex-direction: column; border-right: 2px solid #ccc; background: var(--sidebar); z-index: 10; }
        .sidebar-header { background: #eee; padding: 10px 15px; font-weight: bold; font-size: 0.85em; border-bottom: 1px solid #ddd; text-transform: uppercase; color: #666; }
        
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; }
        #file-list { height: 25%; border-bottom: 2px solid #ddd; }
        #issue-list { height: 75%; background: #fffdfa; }
        
        .file-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.9em; }
        .file-item:hover { background: #eef7ff; color: #3498db; }
        
        .issue-card { background: white; border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 5px solid var(--warning); cursor: pointer; }
        .issue-card:hover { background: #fdf9f0; }
        .issue-card strong { color: #d35400; display: block; font-size: 0.9em; }
        
        .btn-fix { margin-top: 10px; background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-fix:hover { background: #219150; }

        #viewer-container { flex: 1; overflow: auto; padding: 40px; background: var(--viewer); display: flex; flex-direction: column; align-items: center; }
        #notation { background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.3); padding: 20px; display: inline-block; min-width: 800px; }
        
        /* Highlight für den aktiven Takt */
        .highlight-measure {
    outline: 12px solid rgba(255, 0, 0, 0.9) !important;
    outline-offset: 10px;
    background: rgba(255, 0, 0, 0.15);
    box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
    animation: pulse-red 2s infinite;
}

@keyframes pulse-red {
    0% { outline-color: rgba(255, 0, 0, 0.9); }
    50% { outline-color: rgba(255, 0, 0, 0.3); }
    100% { outline-color: rgba(255, 0, 0, 0.9); }
}
        #debug-console { height: 80px; background: #222; color: #00ff00; font-family: monospace; font-size: 10px; padding: 8px; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <div><strong>dzb lesen</strong> | MusicXML Sanitizer</div>
    <div class="nav-controls">
        <button class="btn-nav" onclick="changePage(-1)">◀</button>
        <span id="page-info">Seite - / -</span>
        <button class="btn-nav" onclick="changePage(1)">▶</button>
    </div>
    <div id="status" style="font-size: 0.8em; opacity: 0.8;">Lade...</div>
</header>

<div id="main">
    <div id="sidebar">
        <div class="sidebar-header">Dateien</div>
        <div id="file-list" class="scroll-area">Lade...</div>
        <div class="sidebar-header" style="color: #d35400;">Korrekturbedarf</div>
        <div id="issue-list" class="scroll-area">Wähle eine Datei.</div>
        <div id="debug-console">System-Log bereit...</div>
    </div>
    
    <div id="viewer-container">
        <div id="notation"></div>
    </div>
</div>

<script>
    let vrvToolkit;
    let currentPage = 1;
    let totalPages = 1;
    let currentFile = "";

    function log(msg) {
        const consoleEl = document.getElementById("debug-console");
        consoleEl.innerHTML += `> ${msg}<br>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadFileList(); 

        verovio.module.onRuntimeInitialized = () => {
            vrvToolkit = new verovio.toolkit();
            vrvToolkit.setOptions({
                pageWidth: 2100, 
                scale: 45, 
                header: 'none', 
                footer: 'none',
                adjustPageHeight: true, 
                xmlId: true // Wichtig für IDs im SVG
            });
            log("Verovio initialisiert.");
            document.getElementById("status").innerText = "Bereit.";
        };
    });

    async function loadFileList() {
        try {
            const res = await fetch('/files');
            const files = await res.json();
            const container = document.getElementById("file-list");
            container.innerHTML = "";
            files.forEach(f => {
                const div = document.createElement("div");
                div.className = "file-item";
                div.innerHTML = "🎼 " + f.name;
                div.onclick = () => loadFile(f.folder, f.name);
                container.appendChild(div);
            });
        } catch (e) { log("Fehler beim Laden der Dateiliste."); }
    }

    async function loadFile(folder, name) {
        currentFile = name;
        log(`Lade ${name}...`);
        try {
            const res = await fetch(`/file/${folder}/${name}`);
            const data = await res.json();
            
            if (vrvToolkit) {
                vrvToolkit.loadData(data.content);
                vrvToolkit.redoLayout();
                totalPages = vrvToolkit.getPageCount();
                currentPage = 1;
                render();
                log(`Datei geladen. ${totalPages} Seiten.`);
            }

            const reportRes = await fetch(`/report/${name}`);
            const reportData = await reportRes.json();
            displayIssues(reportData);
        } catch (err) { log("Ladefehler: " + err.message); }
    }

function displayIssues(data) {
    const container = document.getElementById("issue-list");
    container.innerHTML = "";
    const actions = data.actions || [];
    
    actions.forEach(action => {
        let primaryAction = { label: "Heilen ✨", type: action.type };
        if (action.type === "FILLER_REST") primaryAction.label = "Pause entfernen";
        else if (action.type === "INCOMPLETE_MEASURE") primaryAction.label = "Mit Pausen auffüllen";
        else if (action.type === "OVERFULL_MEASURE") {
            primaryAction.label = "Zu Verzierungen umwandeln";
            primaryAction.type = "CONVERT_GRACE";
        }

        const card = document.createElement("div");
        card.className = "issue-card";
        card.innerHTML = `
            <div onclick="jumpTo('${action.measure}')" style="cursor:pointer">
                <strong>Takt ${action.measure}: ${action.type}</strong>
                <p style="font-size:0.8em; margin:5px 0;">${action.message}</p>
            </div>
            <div style="display:flex; gap:5px;">
                <!-- WICHTIG: Hier muss 'event' in der Klammer stehen! -->
                <button class="btn-fix" onclick="applyFix('${currentFile}', ${action.measure}, '${primaryAction.type}', event)">
                    ${primaryAction.label}
                </button>
                ${action.type === "INCOMPLETE_MEASURE" ? `
                    <button class="btn-fix" style="background:#7f8c8d; width:auto;" onclick="applyFix('${currentFile}', ${action.measure}, 'IGNORE', event)">
                        Ignorieren ✅
                    </button>
                ` : ''}
            </div>
        `;
        container.appendChild(card);
    });
}

// Die reparierte applyFix Funktion mit "Gauge"-Feedback
async function applyFix(filename, measure, type, event) {
    const btn = event ? event.target : null;
    const originalText = btn ? btn.innerText : "Heilen";
    
    // Visuelles Feedback (Gauge Ersatz)
    if (btn) {
        btn.disabled = true;
        btn.innerText = "Heile... ⏳";
        btn.style.opacity = "0.6";
    }
    
    log(`Starte Heilung: Takt ${measure} (${type})...`);

    try {
        const response = await fetch('/apply-fix', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename, measure, type })
        });
        const result = await response.json();

        if (result.status === "success") {
            log(`✅ Takt ${measure}: ${result.message}`);
            if (btn) {
                btn.innerText = "Geheilt ✔️";
                btn.style.background = "#bdc3c7";
            }
            // Kurze Pause, dann neu laden
            setTimeout(() => loadFile("needs_review", filename), 800);
        } else {
            log(`❌ Fehler in Takt ${measure}: ${result.message}`);
            if (btn) {
                btn.disabled = false;
                btn.innerText = "Fehler ⚠️";
                btn.style.background = "#e74c3c";
                btn.style.opacity = "1";
            }
            alert("Fehler vom Server: " + result.message);
        }
    } catch (err) {
        log("Netzwerkfehler beim Heilen.");
        if (btn) {
            btn.disabled = false;
            btn.innerText = originalText;
        }
    }
}

    // DIE MEI-BASIERTE NAVIGATION
function jumpTo(measureNum) {
    log(`Suche Takt ${measureNum}...`);
    try {
        const mei = vrvToolkit.getMEI({scoreBased: true});
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(mei, "text/xml");
        
        // Robuste Suche: Wir gehen alle Elemente durch und prüfen den lokalen Namen
        let targetId = null;
        const allElements = xmlDoc.querySelectorAll('*');
        for (let el of allElements) {
            if (el.localName === 'measure' && el.getAttribute('n') === String(measureNum)) {
                targetId = el.getAttribute('xml:id');
                break; // Ersten Treffer nehmen
            }
        }

        if (targetId) {
            log(`Takt gefunden! ID: ${targetId}`);
            const page = vrvToolkit.getPageWithElement(targetId);
            if (page > 0) {
                currentPage = page;
                render();
                
                setTimeout(() => {
                    // Suche im echten DOM (SVG)
                    const svgEl = document.getElementById(targetId);
                    if (svgEl) {
                        svgEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        document.querySelectorAll('.highlight-measure').forEach(e => e.classList.remove('highlight-measure'));
                        svgEl.classList.add('highlight-measure');
                    } else {
                        log("Fehler: Takt-ID im SVG nicht gefunden.");
                    }
                }, 150);
            }
        } else {
            log(`Takt ${measureNum} im MEI-Modell unauffindbar.`);
        }
    } catch (err) {
        log("Nav-Fehler: " + err.message);
    }
}

// In static/index.html die Funktion applyFix ersetzen:

async function applyFix(filename, measure, type, event) {
    const btn = event.target;
    const originalText = btn.innerText;
    
    // UI-Feedback: Button sperren
    btn.disabled = true;
    btn.innerText = "Heile... ⏳";
    btn.style.opacity = "0.5";
    btn.style.cursor = "not-allowed";

    log(`Anfrage gesendet: Takt ${measure} (${type})`);

    try {
        const response = await fetch('/apply-fix', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename, measure, type })
        });
        const result = await response.json();

        if (result.status === "success") {
            log(`✅ Takt ${measure}: ${result.message}`);
            btn.innerText = "Geheilt ✔️";
            btn.style.background = "#bdc3c7"; // Grau machen
            // Datei neu laden um Ergebnis zu sehen
            setTimeout(() => loadFile("needs_review", filename), 500);
        } else {
            log(`❌ Fehler: ${result.message}`);
            btn.disabled = false;
            btn.innerText = "Fehlgeschlagen ⚠️";
            btn.style.opacity = "1";
            btn.style.background = "#e74c3c";
            alert("Konnte nicht gespeichert werden: " + result.message);
        }
    } catch (err) {
        log("Netzwerkfehler.");
        btn.disabled = false;
        btn.innerText = originalText;
    }
}
    function render() {
        if (!vrvToolkit) return;
        document.getElementById("notation").innerHTML = vrvToolkit.renderToSVG(currentPage);
        document.getElementById("page-info").innerText = `Seite ${currentPage} / ${totalPages}`;
    }

    function changePage(delta) {
        if (currentPage + delta >= 1 && currentPage + delta <= totalPages) {
            currentPage += delta;
            render();
            document.getElementById("viewer-container").scrollTop = 0;
        }
    }
</script>
</body>
</html>
