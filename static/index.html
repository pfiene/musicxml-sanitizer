<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MusicXML Sanitizer Preview</title>
    <script src="https://www.verovio.org/javascript/latest/verovio-toolkit-wasm.js" defer></script>
    <style>
        :root { --dark: #2c3e50; --accent: #e74c3c; --sidebar: #ffffff; --viewer: #cbd3da; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #f4f4f4; overflow: hidden; }
        header { background: var(--dark); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 100; }
        .nav-controls { display: flex; align-items: center; gap: 15px; }
        .btn-nav { background: #34495e; color: white; border: 1px solid #555; padding: 5px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        #main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 400px; display: flex; flex-direction: column; border-right: 2px solid #ccc; background: var(--sidebar); }
        .sidebar-header { background: #eee; padding: 8px 15px; font-weight: bold; font-size: 0.85em; border-bottom: 1px solid #ddd; text-transform: uppercase; color: #666; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; }
        #file-list { height: 30%; border-bottom: 2px solid #ddd; }
        #issue-list { height: 55%; background: #fffdfa; }
        .file-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.85em; }
        .file-item:hover { background: #eef7ff; }
        .issue-card { background: white; border: 1px solid #f39c12; padding: 12px; margin-bottom: 10px; border-radius: 5px; cursor: pointer; border-left: 5px solid #f39c12; transition: 0.2s; }
        .issue-card:hover { background: #fff9e6; transform: translateX(5px); }
        .issue-card strong { color: #d35400; display: block; margin-bottom: 3px; }
        #viewer-container { flex: 1; overflow: auto; padding: 30px; background: var(--viewer); display: flex; justify-content: center; }
        #notation { background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); padding: 40px; min-width: 800px; }
        #debug-console { height: 120px; background: #222; color: #00ff00; font-family: monospace; font-size: 11px; padding: 10px; overflow-y: auto; border-top: 2px solid #000; }
    </style>
</head>
<body>

<header>
    <div><strong>dzb lesen</strong> | MusicXML Auditor</div>
    <div class="nav-controls">
        <button class="btn-nav" onclick="changePage(-1)">◀</button>
        <span id="page-info" style="min-width: 100px; text-align: center;">Initialisiere...</span>
        <button class="btn-nav" onclick="changePage(1)">▶</button>
    </div>
    <div id="status" style="font-size: 0.8em; opacity: 0.7;">Warte auf WASM...</div>
</header>

<div id="main">
    <div id="sidebar">
        <div class="sidebar-header">Dateien in Needs Review</div>
        <div id="file-list" class="scroll-area">Lade...</div>
        <div class="sidebar-header" style="color: #d35400;">Korrekturbedarf (Actions)</div>
        <div id="issue-list" class="scroll-area">Wähle eine Datei.</div>
        <div id="debug-console">System-Log bereit...</div>
    </div>
    <div id="viewer-container">
        <div id="viewer"><div id="notation"></div></div>
    </div>
</div>

<script>
    let vrvToolkit;
    let currentPage = 1;
    let totalPages = 1;
    let currentFile = "";

    function log(msg) {
        const consoleEl = document.getElementById("debug-console");
        consoleEl.innerHTML += `> ${msg}<br>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    document.addEventListener("DOMContentLoaded", () => {
        verovio.module.onRuntimeInitialized = () => {
            vrvToolkit = new verovio.toolkit();
            vrvToolkit.setOptions({
                pageWidth: 2100, scale: 45, header: 'none', footer: 'none',
                adjustPageHeight: true, xmlId: true
            });
            log("Verovio initialisiert.");
            loadFileList();
        };
    });

    async function loadFileList() {
        try {
            const res = await fetch('/files');
            const files = await res.json();
            const container = document.getElementById("file-list");
            container.innerHTML = "";
            files.forEach(f => {
                const div = document.createElement("div");
                div.className = "file-item";
                div.innerHTML = "🔴 " + f.name;
                div.onclick = () => loadFile(f.folder, f.name);
                container.appendChild(div);
            });
        } catch (e) { log("Fehler Dateiliste."); }
    }

    async function loadFile(folder, name) {
        currentFile = name;
        log(`Lade ${name}...`);
        try {
            const res = await fetch(`/file/${folder}/${name}`);
            const xml = await res.json();
            vrvToolkit.loadData(xml.content);
            vrvToolkit.redoLayout();
            totalPages = vrvToolkit.getPageCount();
            currentPage = 1;

            const reportRes = await fetch(`/report/${name}`);
            const reportData = await reportRes.json();
            displayIssues(reportData);
            render();
            log(`Datei geladen. ${totalPages} Seiten.`);
        } catch (err) { log("Ladefehler!"); }
    }

    function displayIssues(data) {
        const container = document.getElementById("issue-list");
        container.innerHTML = "";
        
        // Wir erwarten das Array unter 'actions' (wie im JSON-Beispiel)
        const actions = data.actions || [];
        
        if (actions.length === 0) {
            container.innerHTML = "<p style='padding:10px;'>Keine 'actions' im Report gefunden.</p>";
            return;
        }

        actions.forEach(action => {
            const card = document.createElement("div");
            card.className = "issue-card";
            card.innerHTML = `<strong>Takt ${action.measure}: ${action.type}</strong><small>Part: ${action.part || 'N/A'}</small>`;
            card.onclick = () => jumpTo(action.measure);
            container.appendChild(card);
        });
        log(`${actions.length} Korrekturvorschläge geladen.`);
    }

    function jumpTo(measureNum) {
        log(`Suche Takt ${measureNum} via MEI...`);
        try {
            const mei = vrvToolkit.getMEI({scoreBased: true});
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(mei, "text/xml");
            const measures = xmlDoc.getElementsByTagName("measure");
            
            let realId = null;
            for (let m of measures) {
                if (m.getAttribute("n") === String(measureNum)) {
                    realId = m.getAttribute("xml:id");
                    break;
                }
            }

            if (realId) {
                const page = vrvToolkit.getPageWithElement(realId);
                if (page > 0) {
                    currentPage = page;
                    render();
                    setTimeout(() => {
                        const el = document.getElementById(realId);
                        if (el) {
                            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            el.style.outline = "10px solid red";
                            el.style.fill = "red";
                        }
                    }, 150);
                }
            } else {
                log(`Takt ${measureNum} nicht im MEI gefunden.`);
            }
        } catch (err) { log("Nav-Fehler: " + err.message); }
    }

    function render() {
        document.getElementById("notation").innerHTML = vrvToolkit.renderToSVG(currentPage);
        document.getElementById("page-info").innerText = `Seite ${currentPage} / ${totalPages}`;
        document.getElementById("status").innerText = "Bereit.";
    }

    function changePage(delta) {
        if (currentPage + delta >= 1 && currentPage + delta <= totalPages) {
            currentPage += delta;
            render();
            document.getElementById("viewer-container").scrollTop = 0;
        }
    }
</script>
</body>
</html>
