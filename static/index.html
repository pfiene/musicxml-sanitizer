<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MusicXML Sanitizer Preview</title>
    <script src="https://www.verovio.org/javascript/latest/verovio-toolkit-wasm.js" defer></script>
    <style>
        :root { --dark: #2c3e50; --accent: #e74c3c; --sidebar: #ffffff; --viewer: #cbd3da; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #f4f4f4; }
        
        header { background: var(--dark); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 100; }
        .nav-controls { display: flex; align-items: center; gap: 15px; }
        .btn-nav { background: #34495e; color: white; border: 1px solid #555; padding: 5px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        
        #main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 380px; display: flex; flex-direction: column; border-right: 2px solid #ccc; background: var(--sidebar); }
        .sidebar-header { background: #eee; padding: 8px 15px; font-weight: bold; font-size: 0.85em; border-bottom: 1px solid #ddd; text-transform: uppercase; color: #666; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; }
        #file-list { height: 35%; border-bottom: 2px solid #ddd; }
        #issue-list { height: 40%; background: #fffdfa; }

        .file-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 0.85em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-item:hover { background: #eef7ff; }
        .issue-card { background: white; border: 1px solid #f39c12; padding: 10px; margin-bottom: 8px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .issue-card:hover { background: #fff9e6; border-color: #e67e22; transform: translateX(5px); }
        .issue-card strong { color: #d35400; font-size: 0.9em; display: block; }

        #viewer-container { flex: 1; overflow: auto; padding: 30px; background: var(--viewer); display: flex; justify-content: center; }
        #notation { background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); padding: 40px; min-width: 800px; }

        #debug-console { height: 120px; background: #222; color: #00ff00; font-family: monospace; font-size: 11px; padding: 10px; overflow-y: auto; border-top: 2px solid #000; }
    </style>
</head>
<body>

<header>
    <div><strong>dzb lesen</strong> | MusicXML Auditor</div>
    <div class="nav-controls">
        <button class="btn-nav" onclick="changePage(-1)">◀</button>
        <span id="page-info" style="min-width: 100px; text-align: center; font-weight: bold;">Initialisiere...</span>
        <button class="btn-nav" onclick="changePage(1)">▶</button>
    </div>
    <div id="status" style="font-size: 0.8em; opacity: 0.7;">Warte auf WASM...</div>
</header>

<div id="main">
    <div id="sidebar">
        <div class="sidebar-header">Dateien</div>
        <div id="file-list" class="scroll-area">Lade Liste...</div>
        
        <div class="sidebar-header" style="color: #d35400;">Probleme (Klick zum Sprung)</div>
        <div id="issue-list" class="scroll-area">Wähle eine Datei.</div>
        
        <div id="debug-console">System-Log bereit...</div>
    </div>
    
    <div id="viewer-container">
        <div id="viewer">
            <div id="notation"></div>
        </div>
    </div>
</div>

<script>
    let vrvToolkit;
    let currentPage = 1;
    let totalPages = 1;

    function log(msg) {
        const consoleEl = document.getElementById("debug-console");
        consoleEl.innerHTML += `> ${msg}<br>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    document.addEventListener("DOMContentLoaded", () => {
        verovio.module.onRuntimeInitialized = () => {
            vrvToolkit = new verovio.toolkit();
            document.getElementById("status").innerText = "Toolkit bereit.";
            log("Verovio initialisiert.");
            loadFileList();
        };
    });

    async function loadFileList() {
        try {
            const res = await fetch('/files');
            const files = await res.json();
            const container = document.getElementById("file-list");
            container.innerHTML = "";
            files.forEach(f => {
                const div = document.createElement("div");
                div.className = "file-item";
                const icon = f.folder === 'needs_review' ? '🔴' : '🟢';
                div.innerHTML = `${icon} ${f.name}`;
                div.onclick = () => loadFile(f.folder, f.name);
                container.appendChild(div);
            });
            log(`${files.length} Dateien in der Liste.`);
        } catch (e) { log("FEHLER beim Laden der Dateiliste."); }
    }

    async function loadFile(folder, name) {
        log(`Lade ${name}...`);
        try {
            const res = await fetch(`/file/${folder}/${name}`);
            const xml = await res.json();
            
            vrvToolkit.setOptions({
                pageWidth: 2100, scale: 45, adjustPageHeight: 1,
                noFooter: 1, noHeader: 1, useXMLId: true 
            });
            
            vrvToolkit.loadData(xml.content);
            totalPages = vrvToolkit.getPageCount();
            currentPage = 1;

            const reportRes = await fetch(`/report/${name}`);
            const issues = await reportRes.json();
            displayIssues(issues);
            render();
            log(`${name}: ${totalPages} Seiten geladen.`);
        } catch (err) { log("FEHLER beim Laden der Musikdatei!"); }
    }

    function displayIssues(issues) {
        const container = document.getElementById("issue-list");
        container.innerHTML = "";
        if (!issues || issues.length === 0 || typeof issues[0] === 'string') {
            container.innerHTML = "<p style='color:gray; padding:10px;'>Keine Taktfehler erkannt.</p>";
            return;
        }
        issues.forEach(issue => {
            const card = document.createElement("div");
            card.className = "issue-card";
            card.innerHTML = `<strong>Takt ${issue.measure}: ${issue.type}</strong><small>Klicke zum Springen (ID: ${issue.xml_id})</small>`;
            card.onclick = () => jumpTo(issue.xml_id, issue.measure);
            container.appendChild(card);
        });
        log(`${issues.length} Probleme geladen.`);
    }

    function jumpTo(xmlId, measureNum) {
        log(`Anfrage: Sprung zu ${xmlId} (Takt ${measureNum})`);
        
        try {
            // Wir fragen Verovio nach der Seite für unsere Index-ID
            let page = vrvToolkit.getPageNumberForElement(xmlId);
            
            if (page > 0) {
                log(`Erfolg: ID auf Seite ${page} lokalisiert.`);
                currentPage = page;
                render();
                
                // Takt im Bild markieren
                setTimeout(() => {
                    // Wir suchen das Element mit der xml:id im SVG
                    const el = document.getElementById(xmlId);
                    if (el) {
                        el.style.outline = "10px solid #e74c3c";
                        el.style.outlineOffset = "5px";
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        log("Takt markiert.");
                    }
                }, 200);
            } else {
                log(`HINWEIS: ID ${xmlId} nicht im aktuellen Seiten-Index.`);
                alert(`Takt ${measureNum} konnte nicht angesprungen werden.`);
            }
        } catch (err) {
            log("KRITISCHER FEHLER beim Toolkit-Sprung!");
            console.error(err);
        }
    }

    function render() {
        document.getElementById("notation").innerHTML = vrvToolkit.renderToSVG(currentPage);
        document.getElementById("page-info").innerText = `Seite ${currentPage} / ${totalPages}`;
        document.getElementById("status").innerText = "Bereit.";
    }

    function changePage(delta) {
        if (currentPage + delta >= 1 && currentPage + delta <= totalPages) {
            currentPage += delta;
            render();
        }
    }

    window.onkeydown = (e) => {
        if (e.key === "ArrowRight") changePage(1);
        if (e.key === "ArrowLeft") changePage(-1);
    };
</script>

</body>
</html>
