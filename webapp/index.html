<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>MusicXML Sanitizer Review UI</title>
    <script src="https://www.verovio.org/javascript/latest/verovio-toolkit.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f4f4f9; }
        header { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 300px; background: #fff; border-right: 1px solid #ddd; overflow-y: auto; padding: 15px; }
        #viewer { flex: 1; background: white; overflow: auto; position: relative; }
        .file-item { padding: 10px; margin-bottom: 5px; cursor: pointer; border-radius: 4px; border: 1px solid #eee; }
        .file-item:hover { background: #eef2f7; }
        .review-tag { color: #e74c3c; font-weight: bold; font-size: 0.8em; }
        .clean-tag { color: #27ae60; font-weight: bold; font-size: 0.8em; }
        h3 { margin-top: 20px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <div><strong>dzb lesen</strong> | MusicXML Sanitizer</div>
    <button onclick="loadFileList()">Liste aktualisieren</button>
</header>

<main>
    <div id="sidebar">
        <h3>⚠️ Review nötig</h3>
        <div id="review-list"></div>
        <h3>✅ Bereinigt</h3>
        <div id="clean-list"></div>
    </div>
    <div id="viewer">
        <p style="text-align: center; color: #888; margin-top: 100px;">Wähle eine Datei aus der Liste aus.</p>
    </div>
</main>

<script>
    let vrvToolkit = new verovio.toolkit();

    async function loadFileList() {
        try {
            const response = await fetch('http://127.0.0.1:8000/files');
            const data = await response.json();
            
            const reviewList = document.getElementById('review-list');
            const cleanList = document.getElementById('clean-list');
            
            reviewList.innerHTML = data.needs_review.length ? '' : '<p>Keine</p>';
            cleanList.innerHTML = data.cleaned.length ? '' : '<p>Keine</p>';

            data.needs_review.forEach(f => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `<span class="review-tag">REVIEW</span><br>${f}`;
                div.onclick = () => renderMusic('review', f);
                reviewList.appendChild(div);
            });

            data.cleaned.forEach(f => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `<span class="clean-tag">CLEAN</span><br>${f}`;
                div.onclick = () => renderMusic('cleaned', f);
                cleanList.appendChild(div);
            });
        } catch (e) {
            console.error("API nicht erreichbar", e);
        }
    }

    async function renderMusic(folder, filename) {
        document.getElementById('viewer').innerHTML = '<p style="padding:20px;">Lade Musik...</p>';
        const response = await fetch(`http://127.0.0.1:8000/get-xml/${folder}/${filename}`);
        const data = await response.json();

        const options = {
            scale: 40,
            pageWidth: document.getElementById('viewer').clientWidth,
            adjustPageHeight: true,
            font: "Bravura"
        };
        
        vrvToolkit.setOptions(options);
        vrvToolkit.loadData(data.xml);
        const svg = vrvToolkit.renderToSVG(1, {});
        document.getElementById('viewer').innerHTML = svg;
    }

    // Warten bis Verovio bereit ist
    verovio.module.onRuntimeInitialized = () => {
        loadFileList();
    };
</script>
</body>
</html>
